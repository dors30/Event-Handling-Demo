<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpop Fan Zone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Welcome to Kpop Fan Zone</h2>
    <p>Interact and support your favorite group!</p>

    <button id="clickBtn">Send Heart</button>
    <input type="text" id="textInput" placeholder="Type your fan message...">

<select id="dropdown">
    <option value="">Choose your favorite BTS member</option>
    <option value="RM">RM</option>
    <option value="Jin">Jin</option>
    <option value="Suga">Suga</option>
    <option value="J-Hope">J-Hope</option>
    <option value="Jimin">Jimin</option>
    <option value="V">V</option>
    <option value="Jungkook">Jungkook</option>
</select>

    <form id="myForm">
        <input type="text" id="name" placeholder="Enter your name: " required>
        <button type="submit">Send Fan Message</button>
    </form>

    <div id="hoverBox">Cheer for your group!</div>
    <p id="output">Output will appear here...</p>
</div>

<script src="script.js"></script>
</body>
</html>
